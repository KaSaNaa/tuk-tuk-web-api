version: '3.9'

# ══════════════════════════════════════════════════════════════════════════════
# Docker Compose — Sri Lanka Police Tuk-Tuk Tracking API
# Production stack: nginx (TLS) → Node.js API
#
# Usage:
#   1. Generate certs:  bash nginx/generate-certs.sh
#   2. Copy .env.prod to .env and fill in values
#   3. Build and start: docker compose up -d --build
#   4. Seed data:       docker compose exec api npm run seed
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Node.js API service ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuktrack_api
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      PORT:                   3000
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-8h}
      JWT_DEVICE_EXPIRES_IN:  ${JWT_DEVICE_EXPIRES_IN:-365d}
      CORS_ORIGINS:           ${CORS_ORIGINS:-https://api.tuktrak.police.lk}
      RATE_LIMIT_MAX:         ${RATE_LIMIT_MAX:-200}
    volumes:
      - db_data:/app/data/db      # persist NeDB files
    networks:
      - internal                  # NOT exposed to host — only nginx can reach it
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── nginx reverse proxy (TLS termination) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tuktrack_nginx
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP → redirect to HTTPS
      - "443:443"    # HTTPS — the only entry point for clients
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/includes:/etc/nginx/includes:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # TLS cert + key (read-only)
      - ./nginx/logs:/var/log/nginx             # nginx access + error logs
    networks:
      - internal    # can reach Node.js
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  db_data:
    driver: local

networks:
  internal:
    driver: bridge
    internal: false  # allows outbound internet from Node.js (for NTP, DNS)
