# ── Proxy pass parameters (included by nginx.conf location blocks) ─────────────
# These configure how nginx forwards requests to Node.js

proxy_http_version 1.1;
proxy_set_header   Upgrade $http_upgrade;
proxy_set_header   Connection 'upgrade';     # WebSocket support

# Forward real client IP so Node.js can use it for rate-limit keying and audit
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;

# Forward or generate a request ID for distributed tracing
proxy_set_header   X-Request-ID      $request_id;

# Disable proxy buffering for streaming/real-time responses
proxy_buffering    off;

# Timeouts
proxy_connect_timeout 60s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Don't pass error pages from upstream — let nginx generate them
proxy_intercept_errors off;

# Cache-control passthrough
proxy_cache_bypass $http_pragma $http_authorization;
proxy_no_cache     $http_pragma $http_authorization;
