# ══════════════════════════════════════════════════════════════════════════════
# NGINX CONFIGURATION
# Sri Lanka Police – Tuk-Tuk Tracking API
# Production reverse proxy with TLS termination and security hardening
# ══════════════════════════════════════════════════════════════════════════════

# ── Global settings ───────────────────────────────────────────────────────────
user nginx;
worker_processes auto;           # auto-detect CPU cores
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
    use                epoll;    # Linux high-performance event model
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Hide server version from responses ────────────────────────────────────
    server_tokens off;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_buffers       16 8k;
    gzip_http_version  1.1;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;

    # ── Logging format ────────────────────────────────────────────────────────
    # JSON-structured log for easy ingestion into Loki/ELK
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$http_x_request_id",'
        '"ssl_protocol":"$ssl_protocol",'
        '"ssl_cipher":"$ssl_cipher"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Client body / buffer limits (DDoS / large payload protection) ─────────
    client_max_body_size     10k;      # match Express body limit
    client_body_buffer_size  10k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API zone: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

    # Auth zone: 5 requests/minute per IP (brute-force prevention)
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;

    # Device ping zone: 1 request/second per IP (GPS devices ping frequently)
    limit_req_zone $binary_remote_addr zone=api_device:10m  rate=1r/s;

    limit_req_status 429;

    # ── Upstream: Node.js API ─────────────────────────────────────────────────
    # Node binds to 127.0.0.1:3000 — never exposed directly to internet
    upstream nodejs_api {
        server 127.0.0.1:3000;
        keepalive 32;            # persistent connections to Node.js
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect (port 80)
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen      80;
        listen      [::]:80;
        server_name api.tuktrak.police.lk;

        # Allow Let's Encrypt ACME challenge through before redirect
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Force HTTPS for all other requests
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HTTPS server (port 443)
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;                              # HTTP/2 for performance
        server_name api.tuktrak.police.lk;

        # ── TLS certificate ───────────────────────────────────────────────────
        # Production: replace with Let's Encrypt or government-issued cert
        ssl_certificate     /etc/nginx/certs/tuktrack.crt;
        ssl_certificate_key /etc/nginx/certs/tuktrack.key;

        # ── TLS hardening ─────────────────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;  # disable SSLv3, TLS 1.0, 1.1
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;               # let client pick from safe list
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;               # perfect forward secrecy

        # OCSP stapling — speeds up TLS handshake (server pre-fetches cert validity)
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # ── Security headers ──────────────────────────────────────────────────
        # HSTS: tell browsers to always use HTTPS for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # CSP: API returns JSON — no scripts/images needed
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

        # Referrer policy — don't leak URL info
        add_header Referrer-Policy "no-referrer" always;

        # Disable browser features the API does not need
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

        # ── Rate limiting per endpoint ────────────────────────────────────────
        # Applied before proxying — nginx rejects excess requests without touching Node.js

        location /api/v1/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://nodejs_api;
            include    /etc/nginx/includes/proxy_params.conf;
        }

        location /api/v1/locations {
            limit_req zone=api_device burst=10 nodelay;
            proxy_pass http://nodejs_api;
            include    /etc/nginx/includes/proxy_params.conf;
        }

        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://nodejs_api;
            include    /etc/nginx/includes/proxy_params.conf;
        }

        # Swagger UI — development/staging only; block in production
        location /api-docs {
            # Uncomment to block Swagger in production:
            # return 403 '{"status":"error","code":403,"message":"API docs not available in production."}';
            limit_req  zone=api_general burst=5 nodelay;
            proxy_pass http://nodejs_api;
            include    /etc/nginx/includes/proxy_params.conf;
        }

        location / {
            proxy_pass http://nodejs_api;
            include    /etc/nginx/includes/proxy_params.conf;
        }

        # ── Block common attack paths ─────────────────────────────────────────
        location ~ /\.(env|git|htaccess|DS_Store) {
            return 404;
        }
        location ~ \.(php|asp|aspx|jsp|cgi)$ {
            return 404;
        }
    }
}
